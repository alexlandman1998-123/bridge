name: Phase 30 Attorney Calendar Promotion Gate

on:
  pull_request:
    paths:
      - 'migration-evidence/2026-07-20-production-phase30-attorney-calendar/**'
      - 'docs/phase-30-attorney-calendar-repair-promotion.md'
      - 'docs/phase-18-phase-1-release-scope.json'
      - 'docs/supabase-phase-8-closeout-evidence.json'
      - 'scripts/phase30-attorney-calendar-promotion.test.mjs'
      - '.github/workflows/phase30-attorney-calendar-promotion-gate.yml'
  push:
    branches: [main]
    paths:
      - 'migration-evidence/2026-07-20-production-phase30-attorney-calendar/**'
      - 'docs/phase-30-attorney-calendar-repair-promotion.md'
      - 'docs/phase-18-phase-1-release-scope.json'
      - 'docs/supabase-phase-8-closeout-evidence.json'
      - 'scripts/phase30-attorney-calendar-promotion.test.mjs'
      - '.github/workflows/phase30-attorney-calendar-promotion-gate.yml'

permissions:
  contents: read

jobs:
  attorney-calendar-promotion:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run supabase:phase30:verify
