name: Phase 29 Attorney Accounting Promotion Gate

on:
  pull_request:
    paths:
      - 'migration-evidence/2026-07-20-production-phase29-attorney-accounting/**'
      - 'docs/phase-29-deferred-attorney-modules-promotion.md'
      - 'docs/phase-18-phase-1-release-scope.json'
      - 'docs/supabase-phase-8-closeout-evidence.json'
      - 'scripts/phase29-attorney-accounting-promotion.test.mjs'
      - '.github/workflows/phase29-attorney-accounting-promotion-gate.yml'
  push:
    branches: [main]
    paths:
      - 'migration-evidence/2026-07-20-production-phase29-attorney-accounting/**'
      - 'docs/phase-29-deferred-attorney-modules-promotion.md'
      - 'docs/phase-18-phase-1-release-scope.json'
      - 'docs/supabase-phase-8-closeout-evidence.json'
      - 'scripts/phase29-attorney-accounting-promotion.test.mjs'
      - '.github/workflows/phase29-attorney-accounting-promotion-gate.yml'

permissions:
  contents: read

jobs:
  attorney-accounting-promotion:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run supabase:phase29:verify
