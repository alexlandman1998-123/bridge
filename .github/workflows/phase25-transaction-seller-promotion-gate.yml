name: Phase 25 Transaction Seller Gate

on:
  pull_request:
    paths:
      - 'docs/phase-25-transaction-seller-completion-promotion.md'
      - 'docs/supabase-phase-5-application-manifest.json'
      - 'docs/supabase-phase-7-staging-readiness.json'
      - 'docs/supabase-phase-8-closeout-evidence.json'
      - 'migration-evidence/2026-07-20-production-phase25-transaction-seller/**'
      - 'migration-evidence/2026-07-20-staging-phase25/**'
      - 'scripts/phase25-*.test.mjs'
      - 'supabase/migrations/202607209903_transaction_participant_requirements_least_privilege_phase25_fix.sql'
      - 'package.json'
  push:
    paths:
      - 'docs/phase-25-transaction-seller-completion-promotion.md'
      - 'docs/supabase-phase-5-application-manifest.json'
      - 'docs/supabase-phase-7-staging-readiness.json'
      - 'docs/supabase-phase-8-closeout-evidence.json'
      - 'migration-evidence/2026-07-20-production-phase25-transaction-seller/**'
      - 'migration-evidence/2026-07-20-staging-phase25/**'
      - 'scripts/phase25-*.test.mjs'
      - 'supabase/migrations/202607209903_transaction_participant_requirements_least_privilege_phase25_fix.sql'
      - 'package.json'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --ignore-scripts
      - run: npm run supabase:phase25:verify
      - run: node scripts/supabase-phase8-closeout.test.mjs
      - run: node scripts/phase18-phase1-release-scope.test.mjs
