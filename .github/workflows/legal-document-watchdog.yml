name: Legal document watchdog

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  staging-watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: staging
    steps:
      - name: Require watchdog credentials
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_STAGING_URL }}
          SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_STAGING_SERVICE_ROLE_KEY }}
        run: |
          test -n "$SUPABASE_URL"
          test -n "$SERVICE_ROLE_KEY"
      - name: Persist legal-document health snapshot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_STAGING_URL }}
          SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_STAGING_SERVICE_ROLE_KEY }}
        run: |
          curl --fail-with-body --silent --show-error \
            --max-time 90 \
            --request POST \
            --header "Authorization: Bearer $SERVICE_ROLE_KEY" \
            --header "apikey: $SERVICE_ROLE_KEY" \
            --header "Content-Type: application/json" \
            --data '{}' \
            "$SUPABASE_URL/functions/v1/legal-document-watchdog"
