
[auth]
enabled = true
site_url = "https://app.arch9.co.za"
additional_redirect_urls = [
  "https://app.arch9.co.za/auth/callback",
  "https://app.arch9.co.za/auth",
  "https://app.arch9.co.za/onboarding/profile",
  "https://app.bridgenine.co.za/auth/callback",
  "https://app.bridgenine.co.za/auth",
  "https://app.bridgenine.co.za/onboarding/profile",
  "https://admin.arch9.co.za",
  "https://admin.arch9.co.za/",
  "https://admin.bridgenine.co.za",
  "https://admin.bridgenine.co.za/",
  "http://localhost:5173/auth/callback",
  "http://127.0.0.1:5173/auth/callback",
  "http://localhost:5175/auth/callback",
  "http://127.0.0.1:5175/auth/callback",
  "http://localhost:5177/auth/callback",
  "http://127.0.0.1:5177/auth/callback",
  "http://localhost:5174",
  "http://127.0.0.1:5174",
]

[auth.rate_limit]
anonymous_users = 30
email_sent = 1000
sign_in_sign_ups = 30
sms_sent = 30
token_refresh = 150
token_verifications = 30
web3 = 30

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.email]
enable_confirmations = true
max_frequency = "1m0s"
otp_length = 8

[auth.email.smtp]
host = "smtp.resend.com"
port = 587
user = "resend"
pass = "env(SMTP_PASSWORD)"
admin_email = "no-reply@arch9.co.za"
sender_name = "Arch9"

[auth.email.template.confirmation]
subject = "Confirm your Arch9 email address"
content_path = "./supabase/templates/auth/confirmation.html"

[auth.email.template.magic_link]
subject = "Your Arch9 sign-in link"
content_path = "./supabase/templates/auth/magic_link.html"

[auth.email.template.recovery]
subject = "Reset your Arch9 password"
content_path = "./supabase/templates/auth/recovery.html"

[auth.email.template.invite]
subject = "You have been invited to Arch9"
content_path = "./supabase/templates/auth/invite.html"

[auth.email.template.email_change]
subject = "Confirm your new Arch9 email address"
content_path = "./supabase/templates/auth/email_change.html"

[auth.email.template.reauthentication]
subject = "{{ .Token }} is your Arch9 verification code"
content_path = "./supabase/templates/auth/reauthentication.html"

[functions.send-email]
enabled = true
verify_jwt = true
import_map = "./functions/send-email/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/send-email/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/send-email/*.html" ]

[functions.send-mandate-signing-email]
enabled = true
verify_jwt = false
import_map = "./functions/send-mandate-signing-email/deno.json"
entrypoint = "./functions/send-mandate-signing-email/index.ts"

